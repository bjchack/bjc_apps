<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJC Dashboard</title>

<!-- 🔥 AUTO UPDATE SCRIPT (HEAD) -->
<script>
const CURRENT_VERSION = "1.0";

async function checkUpdate(){
  try{
    let res = await fetch("https://bjchack.github.io/bjc_eloading/version.json");
    let data = await res.json();

    document.getElementById("latestVersion") && (document.getElementById("latestVersion").innerText = data.version);
    document.getElementById("currentVersion") && (document.getElementById("currentVersion").innerText = CURRENT_VERSION);

    if(data.version !== CURRENT_VERSION){
      document.getElementById("updateBadge").style.display = "inline";
      document.getElementById("updateBadge").onclick = () => updateApp(data);
    }
  }catch(e){
    console.log("Update check failed");
  }
}

async function updateApp(data){
  document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50%;'>Updating app... Please wait</h2>";

  for(let file of data.files){
    let res = await fetch("https://bjchack.github.io/bjc_eloading/" + file);
    let text = await res.text();
    localStorage.setItem(file, text);
  }

  localStorage.setItem("app_version", data.version);

  setTimeout(()=>{
    alert("App Updated!");
    location.reload();
  },1000);
}
</script>

<style>
/* SAME STYLE MO (DI KO NA BINAGO) */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 15px;
  background: #222;
  border-bottom: 1px solid #333;
  position: relative;
}
header h1 { margin: 0; font-size: 20px; }
.menu-btn {
  background: #333;
  border: none;
  color: white;
  font-size: 20px;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 4px;
}
.dropdown {
  display: none;
  position: absolute;
  right: 15px;
  top: 50px;
  background: #222;
  border: 1px solid #333;
  border-radius: 6px;
}
.dropdown a {
  display: block;
  padding: 10px;
  color: white;
  text-decoration: none;
}
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}
.button-box {
  background: #222;
  border-radius: 6px;
  border: 1px solid #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1/1;
  text-decoration: none;
}
.button-box span { color:white; }

#loadingScreen {
  position: fixed;
  width:100%;
  height:100%;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#offlineMsg {
  display:none;
  position:fixed;
  bottom:0;
  width:100%;
  background:red;
  text-align:center;
  padding:8px;
}
</style>
</head>

<body>

<!-- 🔥 LOAD UPDATED VERSION -->
<script>
let updated = localStorage.getItem("index.html");
if(updated){
  document.open();
  document.write(updated);
  document.close();
}
</script>

<div id="loadingScreen">Loading BJC App...</div>
<div id="offlineMsg">⚠️ No Internet - Offline Mode</div>

<header>
<h1>BJC Dashboard</h1>
<button class="menu-btn" onclick="toggleDropdown()">☰</button>
<div id="menuDropdown" class="dropdown">
<a href="tarp.html">Free Tarp</a>
<a href="admin/admin.html">Admin</a>
<a href="contacts.html">Contacts</a>
<a href="about.html">About</a>
</div>
</header>

<div class="dashboard">
<a href="eload.html" class="button-box"><span>E-Load</span></a>
<a href="cable.html" class="button-box"><span>Cable</span></a>
<a href="utility.html" class="button-box"><span>Bills</span></a>
</div>

<!-- VERSION INFO -->
<div style="text-align:center; margin-top:10px;">
Current: <span id="currentVersion"></span> |
Latest: <span id="latestVersion"></span>
<span id="updateBadge" style="display:none;color:orange;cursor:pointer;"> Update Available</span>
</div>

<footer style="text-align:center; padding:15px;">
© 2026 BJC Eload
</footer>

<!-- SCRIPTS -->
<script>
function toggleDropdown(){
  let m = document.getElementById("menuDropdown");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

window.onload = function(){
  document.getElementById("loadingScreen").style.display = "none";
  checkUpdate();
}
</script>

<script>
function updateOnlineStatus(){
  document.getElementById("offlineMsg").style.display = navigator.onLine ? "none" : "block";
}
window.addEventListener("online", updateOnlineStatus);
window.addEventListener("offline", updateOnlineStatus);
updateOnlineStatus();
</script>

</body>
</html>
