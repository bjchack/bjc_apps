<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Load Balance</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
  }

  .guide-text {
    font-size: 16px;
    margin: 10px 0 30px 0;
    max-width: 300px;
    line-height: 1.4;
  }

  .btn-box {
    width: 220px;
    padding: 15px;
    margin: 15px 0;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
    color: #000;
  }

  /* CHECK BALANCE button */
  #checkBalanceBtn {
    background: linear-gradient(45deg, #00ff9d, #1a73e8);
    box-shadow: 0 4px 10px rgba(0,255,157,0.5), 0 4px 10px rgba(26,115,232,0.5);
  }

  #checkBalanceBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,255,157,0.6), 0 6px 12px rgba(26,115,232,0.6);
  }

  /* Back button (round icon) */
  #backBtn {
    background-color: orange;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 20px;
  }

  #backBtn:hover {
    background-color: #ffc107; /* lighter yellow-orange on hover */
  }

  .footer {
    position: absolute;
    bottom: 10px;
    font-size: 12px;
    color: #888;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>

<div class="guide-text">
  Para malaman kung ilan ang natitirang load mo.<br>
  To check your remaining load balance.
</div>

<div class="btn-box" id="checkBalanceBtn" onclick="sendSMS()">CHECK BALANCE</div>

<div class="btn-box" id="backBtn" onclick="window.location.href='index.html'">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 24 24">
    <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
  </svg>
</div>

<div class="footer">
  &copy; 2026 BJC Programming. All rights reserved.
</div>

<script>
function sendSMS() {
  const phone = "8724";
  const message = "BAL"; // automatic BAL
  window.location.href = `sms:${phone}?body=${message}`;
}
</script>

</body>
</html>
