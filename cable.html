<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJC Eload POS - Satlite/Cignal/Gsat</title>
<style>
body{
  background:#121212;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  padding:20px;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
  background:#222;
  color:white;
  box-sizing:border-box;
}

#nextBtn{
  padding:10px;
  width:100%;
  background:#ff9800;
  color:black;
  font-weight:bold;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

#nextBtn:hover{
  background:#e68900;
}

#providers{
  display:none;
  margin-top:20px;
  animation: slideUp 0.5s ease forwards;
}

@keyframes slideUp{
  0%{opacity:0; transform:translateY(50px);}
  100%{opacity:1; transform:translateY(0);}
}

.provider-btn{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  background:#1e1e1e;
  color:white;
  border:none;
  border-radius:8px;
  padding:15px;
  margin:10px 0;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  transition:0.3s;
  width:100%;
}

.provider-btn:hover{
  background:#333;
}

.provider-btn img{
  width:50px;
  margin-right:15px;
}

/* Modal */
#promoModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#promoModalContent{
  background:#111;
  color:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
  text-align:center;
}

#promoModalContent button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#222;
  color:white;
}

#promoModalContent button:hover{
  background:#444;
}

.back{
  margin-top:20px;
  width:100%;
  padding:10px;
  border:none;
  background:#444;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>BJC Eload POS</h2>

<label>Enter Number (09XXXXXXXXX)</label>
<input type="tel" id="phone" maxlength="11" placeholder="09XXXXXXXXX">
<button id="nextBtn" style="display:none;" onclick="showProviders()">Next</button>

<div id="providers">
  <h3>Select Your Provider</h3>
  <button class="provider-btn" onclick="loadCignal()">
    <img src="icons/cignal.png" alt="Cignal"> Cignal
  </button>
  <button class="provider-btn" onclick="loadGSAT()">
    <img src="icons/gsat.png" alt="GSAT"> GSAT
  </button>
  <button class="provider-btn" onclick="loadSatlite()">
    <img src="icons/satlite.png" alt="Satlite"> Satellite
  </button>
</div>

<!-- Promo Modal -->
<div id="promoModal">
  <div id="promoModalContent">
    <h3 id="modalPromo"></h3>
    <p id="modalDesc"></p>
    <p id="modalPrice"></p>
    <p id="modalDuration"></p>
    <p id="modalGateway"></p>
    <button onclick="sendSMSModal()">Send</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<button class="back" onclick="window.location.href='index.html'">⬅ Back</button>

<script src="cable/cignal.js"></script>
<script src="cable/gsat.js"></script>
<script src="cable/satlite.js"></script>

<script>
const phoneInput = document.getElementById('phone');
const nextBtn = document.getElementById('nextBtn');

phoneInput.addEventListener('input', () => {
  nextBtn.style.display = (phoneInput.value.length === 11) ? 'block' : 'none';
});

function showProviders(){
  document.getElementById('providers').style.display = 'block';
}

// Modal functions
function openModal(code, price, days, desc){
  document.getElementById('modalPromo').innerText = code;
  document.getElementById('modalDesc').innerText = desc || '';
  document.getElementById('modalPrice').innerText = `Price: P${price}`;
  document.getElementById('modalDuration').innerText = `Duration: ${days}`;
  document.getElementById('modalGateway').innerText = '8724';
  document.getElementById('promoModal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('promoModal').style.display = 'none';
}

function sendSMSModal(){
  const clientNumber = document.getElementById('phone').value;
  const promoCode = document.getElementById('modalPromo').innerText;
  const gateway = '8724';
  const message = `${clientNumber} ${promoCode}`;
  window.location.href = `sms:${gateway}?body=${message}`;
}
</script>

</body>
</html>
