<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJC Eload POS Dark</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Minimal inline styling for modal */
  #promoModal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.8); /* darker overlay */
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  #promoModalContent {
    background:#111;   /* dark black background */
    color:#fff;        /* white text */
    padding:20px;
    border-radius:8px;
    width:90%;
    max-width:400px;
    text-align:center;
    position: relative;
  }

  #promoModalContent button {
    margin-top:10px;
    padding:8px 16px;
    background:#222;   /* dark button */
    color:#fff;        /* white text */
    border:none;
    border-radius:4px;
    cursor:pointer;
  }

  #promoModalContent button:hover {
    background:#444;   /* slightly lighter on hover */
  }

  .card {
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    margin:8px 0;
    text-align:center;
  }

  .send-btn {
    margin-top:5px;
    padding:6px 12px;
  }

  .btn-logo {
    width:40px;
    vertical-align:middle;
    margin-right:8px;
  }
</style>
</head>
<body>

<h2>BJC Eload FOR FIBER AND WIFI SMART BRO</h2>
<!-- Sample image to show available load/promos -->
<div style="text-align:center; margin:10px 0;">
  <img src="icons/image.png" alt="Available Loads" style="width:90%; max-width:300px; border-radius:8px; border:1px solid #555;">
</div>
<button onclick="location.href='index.html'" 
        style="margin:10px 0; padding:8px 16px; background:#222; color:#fff; border:none; border-radius:4px; cursor:pointer;"
        onmouseover="this.style.background='#444'" 
        onmouseout="this.style.background='#222'">
  ⬅ Back
</button>

<label>Enter Number (09XXXXXXXXX)</label>
<input type="tel" id="phone" maxlength="11" placeholder="09XXXXXXXXX">

<button id="nextBtn" style="display:none;" onclick="showProviders()">Next</button>

<div id="providers" style="display:none;">
  <h3>Select Provider</h3>

  <button class="provider-btn" onclick="loadPLDT()">
    <img src="icons/pldt.png" class="btn-logo"> PLDT
  </button>

<button class="provider-btn" onclick="loadGlobeFiber()">
  <img src="icons/fiber1.png" class="btn-logo"> Globe Fiber
</button>

  <button class="provider-btn" onclick="loadGlobeAtHome()">
    <img src="icons/globehome.png" class="btn-logo"> Globe At Home
  </button>

  <button class="provider-btn" onclick="loadSmartBro()">
    <img src="icons/smart.png" class="btn-logo"> Smart Bro
  </button>

  <button class="provider-btn" onclick="loadSmartHomeWifi()">
    <img src="icons/smartbrohome.png" class="btn-logo"> Smart Bro Home Wifi
  </button>
</div>

<!-- Promo Modal! -->
<div id="promoModal">
  <div id="promoModalContent">
    <h3 id="modalPromo"></h3>
    <p id="modalDesc"></p>
    <p id="modalPrice"></p>
    <p id="modalDuration"></p>
    <p id="modalGateway"></p>
    <button onclick="sendSMSModal()">Send</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="eload/globeathome.js"></script>
<script src="eload/globefiber.js"></script>
<script src="eload/pldt.js"></script>
<script src="eload/smartbro.js"></script>
<script src="eload/smartbrohomewifi.js"></script>
<script src="script.js"></script>

<script>
const phoneInput = document.getElementById('phone');
const nextBtn = document.getElementById('nextBtn');

// Simula: button hidden at disabled
nextBtn.style.display = 'none';
nextBtn.disabled = true;

// Update button text habang nagta-type
phoneInput.addEventListener('input', () => {
  const value = phoneInput.value;

  if(value.length > 0){
    nextBtn.innerText = value; // Button text = number
  } else {
    nextBtn.innerText = 'Next'; // Default text
  }

  if(value.length === 11){
    nextBtn.style.display = 'block';
    nextBtn.disabled = false;
  } else {
    nextBtn.style.display = 'none';
    nextBtn.disabled = true;
  }
});

// Show providers
function showProviders(){
  document.getElementById('providers').style.display = 'block';
}

// TNT modal function (used in tnt.js)
function openModal(code, price, days, desc){
  document.getElementById('modalPromo').innerText = code;
  document.getElementById('modalDesc').innerText = desc || '';
  document.getElementById('modalPrice').innerText = `Price: P${price}`;
  document.getElementById('modalDuration').innerText = `Duration: ${days}`;
  document.getElementById('modalGateway').innerText = 'Gateway: 8724';
  document.getElementById('promoModal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('promoModal').style.display = 'none';
}

// Send SMS only if 11-digit number
function sendSMSModal(){
  const clientNumber = document.getElementById('phone').value;

  if(clientNumber.length !== 11){
    alert("Enter a valid 11-digit number!");
    return;
  }

  const promoCode = document.getElementById('modalPromo').innerText;
  const gateway = '8724';
  const message = `${clientNumber} ${promoCode}`;
  window.location.href = `sms:${gateway}?body=${message}`;
}
</script>

</body>
</html>
